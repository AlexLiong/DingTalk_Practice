# H2 文件数据库 (免安装, 开发演示用, 重启后仍保留数据)
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/dingtalk;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: true
      path: /h2-console
